<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Job Finder — Nueva contraseña</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700;750;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />
<link rel="stylesheet" href="/auth.css" />
</head>
<body>

<div class="auth-shell">
  <div class="auth-hero">
    <div class="auth-hero-inner">
      <div class="auth-hero-brand">🧭 Job Finder</div>
      <h1>Restablece tu contraseña</h1>
      <p>Elige una contraseña nueva y segura para continuar accediendo a tu cuenta.</p>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="card auth-card">
      <div class="brand-mark">🧭 Job Finder</div>
      <h1 style="text-align:center; font-size:22px;">Nueva contraseña</h1>
      <p class="subtitle" style="text-align:center;">Ingresa y confirma tu nueva contraseña</p>

      <div id="loading-state" style="text-align:center; padding:24px; color:var(--text-muted); font-size:14px;">
        Verificando link…
      </div>

      <form id="reset-form" class="auth-form" style="display:none;">
        <label class="field-label">Nueva contraseña (mínimo 6 caracteres)</label>
        <input type="password" name="password" required minlength="6" />
        <label class="field-label">Confirmar contraseña</label>
        <input type="password" name="password2" required minlength="6" />
        <button type="submit" class="btn" style="width:100%;">Guardar nueva contraseña</button>
        <div class="form-msg"></div>
      </form>

      <div id="error-state" style="display:none; text-align:center; padding:24px;">
        <p style="color:var(--red-600); font-size:14px; margin:0 0 16px;" id="error-msg">
          El link de recuperación no es válido o ya expiró.
        </p>
        <a href="/login.html" class="btn" style="display:inline-block; text-decoration:none;">Volver al inicio de sesión</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/auth.js"></script>
<script src="/reset-password.js"></script>
</body>
</html>
